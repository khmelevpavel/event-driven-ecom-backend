name: CD Pipeline

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
    
    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig
        export KUBECONFIG=./kubeconfig
    
    - name: Deploy to Kubernetes
      run: |
        # Update image tags in Kubernetes manifests
        sed -i "s|ecommerce/products-service:latest|ecommerce/products-service:${{ github.sha }}|g" k8s/products-service.yaml
        sed -i "s|ecommerce/orders-service:latest|ecommerce/orders-service:${{ github.sha }}|g" k8s/orders-service.yaml
        sed -i "s|ecommerce/payments-service:latest|ecommerce/payments-service:${{ github.sha }}|g" k8s/payments-service.yaml
        sed -i "s|ecommerce/events-service:latest|ecommerce/events-service:${{ github.sha }}|g" k8s/events-service.yaml
        
        # Apply Kubernetes manifests
        kubectl apply -k k8s/
        
        # Wait for deployments to be ready
        kubectl wait --for=condition=available --timeout=300s deployment/products-service -n ecommerce
        kubectl wait --for=condition=available --timeout=300s deployment/orders-service -n ecommerce
        kubectl wait --for=condition=available --timeout=300s deployment/payments-service -n ecommerce
        kubectl wait --for=condition=available --timeout=300s deployment/events-service -n ecommerce
    
    - name: Verify deployment
      run: |
        kubectl get pods -n ecommerce
        kubectl get services -n ecommerce

