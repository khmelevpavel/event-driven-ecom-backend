version: '3.8'

services:
  # Kafka and Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - ecommerce-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - ecommerce-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - ecommerce-network

  # PostgreSQL Databases
  postgres-products:
    image: postgres:15-alpine
    container_name: postgres-products
    environment:
      POSTGRES_DB: products_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-products-data:/var/lib/postgresql/data
    networks:
      - ecommerce-network

  postgres-orders:
    image: postgres:15-alpine
    container_name: postgres-orders
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-orders-data:/var/lib/postgresql/data
    networks:
      - ecommerce-network

  postgres-payments:
    image: postgres:15-alpine
    container_name: postgres-payments
    environment:
      POSTGRES_DB: payments_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres-payments-data:/var/lib/postgresql/data
    networks:
      - ecommerce-network

  postgres-events:
    image: postgres:15-alpine
    container_name: postgres-events
    environment:
      POSTGRES_DB: events_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres-events-data:/var/lib/postgresql/data
    networks:
      - ecommerce-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - ecommerce-network

  # Microservices
  products-service:
    build:
      context: .
      dockerfile: ./services/products/Dockerfile
    container_name: products-service
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres-products:5432/products_db
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - postgres-products
      - redis
      - kafka
    networks:
      - ecommerce-network
    volumes:
      - ./services/products:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  orders-service:
    build:
      context: .
      dockerfile: ./services/orders/Dockerfile
    container_name: orders-service
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres-orders:5432/orders_db
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - postgres-orders
      - redis
      - kafka
    networks:
      - ecommerce-network
    volumes:
      - ./services/orders:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  payments-service:
    build:
      context: .
      dockerfile: ./services/payments/Dockerfile
    container_name: payments-service
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres-payments:5432/payments_db
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - postgres-payments
      - redis
      - kafka
    networks:
      - ecommerce-network
    volumes:
      - ./services/payments:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  events-service:
    build:
      context: .
      dockerfile: ./services/events/Dockerfile
    container_name: events-service
    ports:
      - "8004:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres-events:5432/events_db
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - postgres-events
      - redis
      - kafka
    networks:
      - ecommerce-network
    volumes:
      - ./services/events:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

networks:
  ecommerce-network:
    driver: bridge

volumes:
  postgres-products-data:
  postgres-orders-data:
  postgres-payments-data:
  postgres-events-data:
  redis-data:

